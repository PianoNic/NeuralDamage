<aside class="flex h-full w-64 flex-col border-r border-border bg-card">
  <!-- Header -->
  <div class="flex items-center justify-between p-4">
    <h2 class="text-lg font-semibold text-foreground">Chats</h2>
    <button hlmBtn variant="ghost" size="sm" (click)="createChat()">+ New</button>
  </div>

  <hlm-separator />

  <!-- Chat list -->
  <div class="flex-1 overflow-y-auto">
    @for (chat of filteredChats(); track chat.id) {
      <a
        class="flex items-center justify-between px-4 py-3 hover:bg-accent"
        [routerLink]="['/chat', chat.id]"
        routerLinkActive="bg-accent"
      >
        <span class="truncate text-sm text-foreground">{{ chat.name }}</span>
        <button hlmBtn variant="ghost" size="icon" class="h-6 w-6" (click)="deleteChat(chat.id); $event.preventDefault()">
          ✕
        </button>
      </a>
    } @empty {
      <p class="p-4 text-sm text-muted-foreground">No chats yet</p>
    }
  </div>

  <hlm-separator />

  <!-- User profile -->
  <div class="flex items-center gap-3 p-4">
    <hlm-avatar class="h-8 w-8">
      <span hlmAvatarFallback class="text-xs">{{ displayName().charAt(0) }}</span>
    </hlm-avatar>
    <span class="flex-1 truncate text-sm text-foreground">{{ displayName() }}</span>
    <button hlmBtn variant="ghost" size="sm" (click)="logout()">Logout</button>
  </div>
</aside>
