<div class="space-y-4">
  <!-- Name -->
  <div class="space-y-1">
    <label hlmLabel>Name</label>
    <input hlmInput class="w-full" [ngModel]="name()" (ngModelChange)="name.set($event)" placeholder="Bot name" />
  </div>

  <!-- Model -->
  <div class="space-y-1">
    <label hlmLabel>Model</label>
    <hlm-autocomplete [(value)]="selectedModel" [(search)]="modelSearch" [itemToString]="modelToString">
      <hlm-autocomplete-input placeholder="Search models..." />
      <hlm-autocomplete-content *hlmAutocompletePortal>
        <hlm-autocomplete-empty>No models found.</hlm-autocomplete-empty>
        <div hlmAutocompleteList>
          @for (model of filteredModels(); track model.id) {
            <hlm-autocomplete-item [value]="model">
              <div class="flex flex-col">
                <span class="text-sm">{{ model.name }}</span>
                <span class="text-xs text-muted-foreground">{{ model.id }}</span>
              </div>
            </hlm-autocomplete-item>
          }
        </div>
      </hlm-autocomplete-content>
    </hlm-autocomplete>
  </div>

  <!-- System prompt -->
  <div class="space-y-1">
    <label hlmLabel>System Prompt</label>
    <textarea hlmTextarea rows="3" class="w-full" [ngModel]="systemPrompt()" (ngModelChange)="systemPrompt.set($event)" placeholder="Instructions for the bot..."></textarea>
  </div>

  <!-- Personality -->
  <div class="space-y-1">
    <label hlmLabel>Personality (optional)</label>
    <input hlmInput class="w-full" [ngModel]="personality()" (ngModelChange)="personality.set($event)" placeholder="e.g., friendly, formal, sarcastic" />
  </div>

  <!-- Aliases -->
  <div class="space-y-1">
    <label hlmLabel>Aliases (optional)</label>
    <input hlmInput class="w-full" [ngModel]="aliases()" (ngModelChange)="aliases.set($event)" placeholder="e.g., gpt, chatgpt (comma-separated)" />
  </div>

  <!-- Temperature -->
  <div class="space-y-1">
    <label hlmLabel>Temperature: {{ temperature().toFixed(1) }}</label>
    <hlm-slider [min]="0" [max]="2" [step]="0.1" [value]="[temperature()]" (valueChange)="temperature.set($event[0])" />
  </div>

  <!-- Actions -->
  <div class="flex justify-end gap-2 pt-2">
    <button hlmBtn variant="outline" (click)="onCancel()">Cancel</button>
    <button hlmBtn [disabled]="loading() || !name().trim() || !selectedModel()" (click)="onSave()">
      @if (isEditing()) { Save } @else { Create }
    </button>
  </div>
</div>
