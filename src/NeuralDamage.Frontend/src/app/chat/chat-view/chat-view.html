<div class="flex h-full flex-col">
  <!-- Chat header -->
  <div class="flex items-center justify-between border-b border-border px-4 py-3">
    <div>
      <h2 class="text-lg font-semibold text-foreground">{{ chatName() }}</h2>
      <p class="text-xs text-muted-foreground">{{ memberCount() }} members</p>
    </div>
    <button hlmBtn variant="outline" size="sm" (click)="toggleBotManager()">Bots</button>
  </div>

  <!-- Messages -->
  @if (loading()) {
    <div class="flex flex-1 items-center justify-center">
      <hlm-spinner />
    </div>
  } @else {
    <app-message-list
      class="flex-1 overflow-hidden"
      [messages]="messages()"
      (replyTo)="setReplyTo($event)"
    />
  }

  <!-- Typing indicator -->
  <app-typing-indicator [typingUsers]="typingUsers()" [typingBots]="typingBots()" />

  <!-- Message input -->
  <app-message-input
    [members]="members()"
    [replyingTo]="replyingTo()"
    (send)="sendMessage($event)"
    (cancelReply)="setReplyTo(null)"
  />
</div>
