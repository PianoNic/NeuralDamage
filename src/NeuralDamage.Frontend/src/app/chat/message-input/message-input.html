<div class="border-t border-border px-4 py-3">
  <!-- Reply preview -->
  @if (replyingTo(); as reply) {
    <div class="mb-2 flex items-center justify-between rounded-lg border border-border bg-muted/50 px-3 py-2">
      <div class="min-w-0 flex-1 text-xs">
        <span class="text-muted-foreground">Replying to </span>
        <span class="font-semibold text-foreground">{{ reply.senderName }}</span>
        <p class="truncate text-muted-foreground">{{ reply.content }}</p>
      </div>
      <button hlmBtn variant="ghost" size="icon" class="ml-2 h-6 w-6 shrink-0" (click)="onCancelReply()">
        <ng-icon name="lucideX" class="size-3.5" />
      </button>
    </div>
  }

  <!-- Mention suggestions dropdown -->
  @if (mentionSuggestions().length > 0) {
    <div class="mb-2 rounded-lg border border-border bg-card p-1 shadow-lg">
      @for (member of mentionSuggestions(); track member.id) {
        <button hlmBtn variant="ghost" class="w-full justify-start gap-2 text-sm">
          <hlm-avatar class="h-6 w-6">
            <span hlmAvatarFallback class="text-[10px]">{{ (member.displayName ?? 'U').charAt(0).toUpperCase() }}</span>
          </hlm-avatar>
          {{ member.displayName }}
        </button>
      }
    </div>
  }

  <!-- Input area -->
  <div class="flex items-end gap-2">
    <textarea
      hlmTextarea
      rows="1"
      class="min-h-[40px] flex-1 resize-none"
      placeholder="Type a message... (use @ to mention)"
      [ngModel]="content()"
      (ngModelChange)="content.set($event)"
      (keydown)="onKeydown($event)"
    ></textarea>
    <button
      hlmBtn
      size="icon"
      class="mb-px h-10 w-10 shrink-0"
      (click)="onSend()"
      [disabled]="!content().trim()"
      title="Send message"
    >
      <ng-icon name="lucideSendHorizontal" class="size-4" />
    </button>
  </div>
</div>
