services:
  db:
    image: postgres:17
    container_name: neuraldamage-db
    environment:
      POSTGRES_USER: neuraldamage
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: neuraldamage
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuraldamage"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/NeuralDamage.API/Dockerfile
    container_name: neuraldamage-api
    env_file: .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=neuraldamage;Username=neuraldamage;Password=changeme
    ports:
      - "5012:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: neuraldamage-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db-data:
