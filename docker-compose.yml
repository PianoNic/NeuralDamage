services:
  backend:
    build: ./backend
    container_name: neuraldamage-backend
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/neuraldamage.db
    volumes:
      - db-data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: neuraldamage-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
